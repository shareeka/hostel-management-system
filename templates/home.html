<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hostel Management</title>

<style>
/* Basic Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1E90FF, #00BFFF);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
    text-align: center;
    overflow: hidden;
}

/* Container Card */
.container {
    background: rgba(255, 255, 255, 0.1);
    padding: 60px 40px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    animation: fadeIn 1s ease forwards;
    transform: translateY(-50px);
    opacity: 0;
}

/* Header */
h2 {
    font-size: 2.5rem;
    margin-bottom: 50px;
    color: #fff;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
    animation: slideDown 1s ease forwards;
}

/* Buttons / Links */
a {
    display: block;
    width: 280px;
    margin: 15px auto;
    padding: 18px 0;
    background: #fff;
    color: #1E90FF;
    font-weight: bold;
    text-decoration: none;
    border-radius: 50px;
    font-size: 1.1rem;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
}

/* Button hover animation */
a:hover {
    color: #fff;
    background: #00BFFF;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    transform: translateY(-5px);
}

a::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.15);
    transform: skewX(-20deg);
    transition: all 0.5s ease;
}

a:hover::before {
    left: 100%;
}

/* Animations */
@keyframes fadeIn {
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

@keyframes slideDown {
    from {
        transform: translateY(-20px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

/* Responsive */
@media(max-width:500px){
    .container {
        padding: 40px 20px;
    }
    a {
        width: 90%;
        font-size: 1rem;
    }
    h2 {
        font-size: 2rem;
    }
}
</style>
</head>

<body>
<div class="container">
    <h2>Hostel Management System</h2>
    <a href="/admin-login/">Admin Login</a>
    <a href="/students/register/">Student Register</a>
    <a href="/students/login/">Student Login</a>
    <!-- <a href="/warden-login/">Warden Login</a> -->
</div>
</body>
</html>
