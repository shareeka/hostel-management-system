<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<style>
/* Reset & Body */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    color: #333;
}

/* Navbar */
.navbar {
    width: 100%;
    background: linear-gradient(135deg, #1E90FF, #00BFFF);
    padding: 15px 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    margin-bottom: 30px;
}
.navbar a {
    color: #fff;
    font-weight: bold;
    text-decoration: none;
    padding: 8px 15px;
    margin: 0 10px;
    border-radius: 8px;
    transition: all 0.3s ease;
}
.navbar a:hover {
    background: #fff;
    color: #1E90FF;
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

/* Container */
.container {
    width: 95%;
    max-width: 1000px;
    margin: 0 auto;
    text-align: center;
}

/* Welcome heading */
h2 {
    margin-bottom: 30px;
    color: #1E90FF;
}

/* Cards */
.card {
    display: inline-block;
    width: 28%;
    background: #fff;
    margin: 10px;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    text-align: center;
}
.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
}

/* Card links */
.card a {
    text-decoration: none;
    color: #1E90FF;
    font-weight: bold;
    display: block;
    margin-bottom: 10px;
    transition: color 0.3s ease;
}
.card a:hover {
    color: #00BFFF;
}

/* Card description */
.card p {
    font-weight: 500;
    color: #555;
}

/* Responsive */
@media(max-width:900px) {
    .card {
        width: 45%;
    }
}
@media(max-width:600px) {
    .card {
        width: 90%;
    }
}
</style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <a href="#">Dashboard</a>
    <a href="{% url 'student_room' %}">My Room</a>
    <a href="/fees/student-fees/">My Fees</a>
    <a href="/complaints/add/">Complaint</a>
    <a href="{% url 'student_notices' %}">Notice</a>
    <a href="{% url 'student_logout' %}">Logout</a>
</div>

<!-- Dashboard Container -->
<div class="container">
    <h2>Welcome {{student.name}}</h2>

    <div class="card">
        <h3>{{student.room}}</h3>
        <p>My Room</p>
    </div>

    <div class="card">
        <a href="/fees/student-fees/">View My Fees</a>
        <p>Pending Fees</p>
    </div>

    <div class="card">
        <a href="/complaints/add/">Raise Complaint</a>
        <p>My Complaints</p>
    </div>
</div>

</body>
</html>
