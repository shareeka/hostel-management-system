<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Register</title>

<style>
/* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    color: #333;
}

/* Navbar */
.navbar {
    width: 100%;
    background: linear-gradient(135deg, #1E90FF, #00BFFF);
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.navbar a {
    color: #fff;
    font-weight: bold;
    text-decoration: none;
    padding: 8px 15px;
    border-radius: 8px;
    transition: all 0.3s ease;
}

.navbar a:hover {
    background: #fff;
    color: #1E90FF;
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

/* Container */
.container {
    max-width: 500px;
    margin: 50px auto;
    background: rgba(255,255,255,0.9);
    padding: 40px 30px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    animation: fadeIn 1s ease forwards;
    transform: translateY(-50px);
    opacity: 0;
}

/* Headings */
h2 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 2rem;
    color: #1E90FF;
}

/* Form Elements */
label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
    color: #333;
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 1rem;
    outline: none;
    transition: all 0.3s ease;
}

input:focus, textarea:focus {
    box-shadow: 0 0 10px #00BFFF;
    border-color: #00BFFF;
}

/* Button */
button {
    margin-top: 20px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #1E90FF, #00BFFF);
    color: #fff;
    font-weight: bold;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
    padding: 12px;
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.15);
    transform: skewX(-20deg);
    transition: all 0.5s ease;
}

button:hover::before {
    left: 100%;
}

/* Login Link */
.login-link {
    display: block;
    text-align: center;
    margin-top: 15px;
    color: #1E90FF;
    font-weight: bold;
    text-decoration: none;
    transition: color 0.3s ease;
}

.login-link:hover {
    color: #00BFFF;
}

/* Animations */
@keyframes fadeIn {
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

/* Responsive */
@media(max-width:550px){
    .container {
        width: 90%;
        padding: 30px 20px;
    }
}
</style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <div>Hostel Management</div>
    <div>
        <a href="/students/login/">Login</a>
    </div>
</div>

<!-- Register Form -->
<div class="container">
    <h2>Student Register</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <label>Name</label>
        <input type="text" name="name" required>

        <label>Email</label>
        <input type="email" name="email">

        <label>Phone</label>
        <input type="text" name="phone">

        <label>Address</label>
        <textarea name="address"></textarea>

        <label>College</label>
        <input type="text" name="college">

        <label>Course</label>
        <input type="text" name="course">

        <label>Username</label>
        <input type="text" name="username" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <label>Photo</label>
        <input type="file" name="photo">

        <label>ID Proof</label>
        <input type="file" name="id_proof">

        <button type="submit">Register</button>
    </form>

    <a class="login-link" href="/students/login/">Already have an account? Login</a>
</div>

</body>
</html>
