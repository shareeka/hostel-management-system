<!DOCTYPE html>
<html>
<head>

<title>Room Members</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
}

table{
width:90%;
margin:auto;
background:white;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid gray;
text-align:center;
}

img{
width:50px;
height:50px;
}

</style>

</head>

<body>

<h2 style="text-align:center;">Room Members</h2>

<table>

<tr>
<th>Photo</th>
<th>Name</th>
<th>Room</th>
<th>Action</th>
</tr>

{% for student in students %}

<tr>

<td>
<img src="{{student.photo.url}}">
</td>

<td>{{student.name}}</td>
<td>{{student.room.room_number}}</td>
<td>
<a href="/rooms/vacate-room/{{student.id}}/">Vacate</a>
</td>
</tr>

{% endfor %}

</table>

</body>
</html>
