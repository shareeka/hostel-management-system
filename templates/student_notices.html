<!DOCTYPE html>
<html>
<head>
    <title>Notices</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f8;
            margin: 0;
            padding: 0;
        }

        .navbar {
            width: 100%;
            background: linear-gradient(135deg, #1E90FF, #00BFFF);
            padding: 15px 20px;
            text-align: center;
        }

        .navbar a {
            color: #fff;
            font-weight: bold;
            text-decoration: none;
            padding: 8px 15px;
            margin: 0 10px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .navbar a:hover {
            background: #fff;
            color: #1E90FF;
        }

        .container {
            width: 90%;
            max-width: 900px;
            margin: 30px auto;
        }

        .notice {
            background: #fff;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 5px solid #1E90FF;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .notice:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .notice h3 {
            margin-bottom: 10px;
            color: #1E90FF;
        }

        .notice p {
            color: #555;
        }

        .notice span {
            font-size: 0.85rem;
            color: #999;
        }
    </style>
</head>
<body>

<div class="navbar">
    <a href="/students/dashboard/">Dashboard</a>
    <a href="/students/notices/">Notices</a>
    <a href="{% url 'student_logout' %}">Logout</a>
</div>

<div class="container">
    <h2 style="text-align:center; color:#1E90FF;">All Notices</h2>

    {% for notice in notices %}
<div class="notice">
    <h3>{{ notice.title }}</h3>
    <p>{{ notice.description }}</p>
    <span>Posted on: {{ notice.date|date:"d M Y" }}</span>
</div>
{% empty %}
<p style="text-align:center;">No notices found.</p>
{% endfor %}
</div>

</body>
</html>
