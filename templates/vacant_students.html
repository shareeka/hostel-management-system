<!DOCTYPE html>
<html>
<head>

<title>Vacant Students</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
}

table{
width:90%;
margin:auto;
background:white;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid gray;
text-align:center;
}

</style>

</head>

<body>

<h2 style="text-align:center;">Vacant Students</h2>

<table>

<tr>
<th>Name</th>
<th>Phone</th>
<th>College</th>
</tr>

{% for student in students %}

<tr>

<td>{{student.name}}</td>
<td>{{student.phone}}</td>
<td>{{student.college}}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
