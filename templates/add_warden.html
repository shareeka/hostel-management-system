<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Warden</title>

<style>
/* Reset & Body */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #ffffff;
    min-height: 100vh;
    color: #333;
}

/* Navbar */
.navbar {
    width: 100%;
    background: linear-gradient(135deg, #1E90FF, #00BFFF);
    padding: 15px 20px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    border-radius: 0 0 15px 15px;
    margin-bottom: 30px;
}

.navbar a {
    color: #fff;
    font-weight: bold;
    text-decoration: none;
    padding: 8px 15px;
    border-radius: 8px;
    transition: all 0.3s ease;
}

.navbar a:hover {
    background: #ffffff;
    color: #1E90FF;
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

/* Container / Form */
.container {
    width: 500px;
    margin: 50px auto;
    background: rgba(255,255,255,0.1);
    padding: 40px 30px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    animation: fadeIn 1s ease forwards;
    transform: translateY(-50px);
    opacity: 0;
}

/* Form Elements */
h2 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 2rem;
    color: #1E90FF;
}

label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
    color: #333;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 1rem;
    outline: none;
    transition: all 0.3s ease;
}

input:focus {
    box-shadow: 0 0 10px #00BFFF;
    border-color: #00BFFF;
}

/* Button */
button {
    margin-top: 20px;
    border: none;
    border-radius: 50px;
    background: #1E90FF;
    color: #fff;
    font-weight: bold;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
    padding: 12px;
    width: 100%;
    text-align: center;
}

button:hover {
    background: #00BFFF;
    transform: translateY(-3px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.15);
    transform: skewX(-20deg);
    transition: all 0.5s ease;
}

button:hover::before {
    left: 100%;
}

/* Animations */
@keyframes fadeIn {
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

/* Responsive */
@media(max-width:550px){
    .container {
        width: 90%;
        padding: 30px 20px;
    }
}
</style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <a href="/dashboard/">Dashboard</a>
</div>

<!-- Add Warden Form -->
<div class="container">
    <h2>Add Warden</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <label>Name</label>
        <input type="text" name="name" required>
        
        <label>Email</label>
        <input type="email" name="email">
        
        <label>Phone</label>
        <input type="text" name="phone">
        
        <label>Username</label>
        <input type="text" name="username" required>
        
        <label>Password</label>
        <input type="password" name="password" required>
        
        <label>Photo</label>
        <input type="file" name="photo">
        
        <button type="submit">Add Warden</button>
    </form>
</div>

</body>
</html>
