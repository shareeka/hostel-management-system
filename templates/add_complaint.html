<!DOCTYPE html>
<html>
<head>

<title>Raise Complaint</title>

<style>

/* Reset & Body */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #333;
}

/* Container */
.container{
    width: 100%;
    max-width: 500px;
    background: #fff;
    padding: 30px 25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    border-radius: 15px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.container:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
}

/* Heading */
h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #1E90FF;
}

/* Input & Textarea */
input, textarea {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 14px;
    transition: border 0.3s ease;
}
input:focus, textarea:focus {
    border-color: #1E90FF;
    outline: none;
}

/* Button */
button{
    padding: 12px;
    background: #1E90FF;
    color: white;
    border: none;
    margin-top: 20px;
    width: 100%;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.3s ease, transform 0.2s ease;
}
button:hover {
    background: #00BFFF;
    transform: translateY(-2px);
}

/* Label */
label {
    font-weight: 600;
    margin-top: 15px;
    display: block;
    color: #555;
}

/* Responsive */
@media(max-width:600px){
    .container{
        padding: 25px 15px;
    }
    input, textarea, button {
        font-size: 14px;
    }
}
</style>

</head>

<body>

<div class="container">

<h2>Raise Complaint</h2>

<form method="POST">

    {% csrf_token %}

    <label>Complaint Title</label>
    <input type="text" name="title" placeholder="Enter complaint title" required>

    <label>Description</label>
    <textarea name="description" rows="6" placeholder="Describe your complaint..." required></textarea>

    <button type="submit">Submit Complaint</button>

</form>

</div>

</body>
</html>
