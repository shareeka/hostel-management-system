<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Fees</title>

<style>
/* Reset & Body */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    color: #333;
}

/* Navbar */
.navbar {
    width: 100%;
    background: linear-gradient(135deg, #1E90FF, #00BFFF);
    padding: 15px 20px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    margin-bottom: 30px;
}
.navbar a {
    color: #fff;
    font-weight: bold;
    text-decoration: none;
    padding: 8px 15px;
    margin: 0 10px;
    border-radius: 8px;
    transition: all 0.3s ease;
}
.navbar a:hover {
    background: #fff;
    color: #1E90FF;
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

/* Table */
.table-container {
    width: 90%;
    max-width: 900px;
    margin: 0 auto 50px auto;
    background: #fff;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    animation: fadeIn 1s ease forwards;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #1E90FF;
    font-size: 2rem;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px 15px;
    border-bottom: 1px solid #ddd;
    text-align: center;
    transition: background 0.3s ease;
}

th {
    background: #1E90FF;
    color: white;
}

tr:nth-child(even) {
    background: #f9f9f9;
}

tr:hover {
    background: #e0f0ff;
}

/* Animations */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-20px);}
    to { opacity: 1; transform: translateY(0);}
}

/* Responsive */
@media(max-width: 600px){
    th, td {
        padding: 10px 5px;
    }
    .navbar a {
        margin: 5px 5px;
        padding: 6px 10px;
    }
}
.pay-btn{
background:#1E90FF;
color:white;
padding:6px 12px;
text-decoration:none;
border-radius:6px;
}

.pay-btn:hover{
background:#00BFFF;
}
</style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <a href="{% url 'student_dashboard' %}">Dashboard</a>
    <a href="{% url 'student_room' %}">My Room</a>
    <a href="/fees/student-fees/">My Fees</a>
    <a href="/complaints/add/">Complaint</a>
    <a href="{% url 'view_notice' %}">Notice</a>
    <a href="{% url 'student_logout' %}">Logout</a>
</div>

<!-- Fees Table -->
<div class="table-container">
    <h2>My Fees</h2>
    <table>
        <tr>
            <th>Month</th>
            <th>Amount</th>
            
            <th>Date</th>
            <th>Action</th>
        </tr>

        {% for fee in fees %}
        <tr>
            <td>{{fee.month}}</td>
            <td>{{fee.amount}}</td>
        
            <td>{{fee.payment_date}}</td>
            <td>
{% if fee.status == "Pending" %}
<span style="color:red;">Pending</span>
<a href="/fees/pay/{{fee.id}}/" class="pay-btn">Pay</a>
{% else %}
<span style="color:green;">Paid</span>
{% endif %}
</td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
